name: DB Migration Check

on:
  pull_request:
    branches: [main]
    paths:
      - 'db/migrations/**'

jobs:
  validate-sql:
    name: Validate SQL Syntax
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: cerul_test
          POSTGRES_PASSWORD: cerul_test
          POSTGRES_DB: cerul_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U cerul_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Run migrations against test database
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: cerul_test
          PGPASSWORD: cerul_test
          PGDATABASE: cerul_test
        run: |
          echo "Running all migration files in order..."
          find db/migrations -type f -name '*.sql' | sort | while IFS= read -r f; do
            echo "==> Applying $f"
            psql -v ON_ERROR_STOP=1 -f "$f"
            echo "    OK"
          done

      - name: Verify schema tables exist
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: cerul_test
          PGPASSWORD: cerul_test
          PGDATABASE: cerul_test
        run: |
          echo "Checking core tables..."
          psql -c "\dt" | tee /tmp/tables.txt

          for table in user_profiles api_keys broll_assets knowledge_segments processing_jobs query_logs; do
            if grep -q "$table" /tmp/tables.txt; then
              echo "  [OK] $table"
            else
              echo "  [MISSING] $table"
              exit 1
            fi
          done
          echo "All core tables verified."
