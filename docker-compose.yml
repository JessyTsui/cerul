services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: cerul
      POSTGRES_USER: cerul
      POSTGRES_PASSWORD: cerul
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cerul -d cerul"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - cerul-postgres-data:/var/lib/postgresql/data

volumes:
  cerul-postgres-data:
