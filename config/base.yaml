version: 1

public:
  default_track: broll
  enabled_tracks:
    - broll
    - knowledge

search:
  mmr_lambda: 0.75
  clip_score_threshold: null

embedding:
  model: gemini-embedding-2-preview
  # Supported: 128–3072. Recommended: 768, 1536, 3072.
  # 768 delivers near-peak quality at ¼ the storage of 3072.
  # Note: embeddings at non-3072 dims are L2-normalised automatically (normalize: true).
  dimension: 768
  normalize: true

knowledge:
  scene_threshold: 0.35
  rerank_top_n: 20
  rerank_prompt_template: default
  # "openai"  → gpt-4o-mini, 20 parallel calls per search (default, no extra key needed)
  # "cohere"  → rerank-v3.5, 1 call per search (set COHERE_API_KEY to enable)
  rerank_backend: openai
  rerank_model: gpt-4o-mini

dashboard:
  admin_emails: []
  bootstrap_admin_secret: null
