services:
  worker:
    image: ghcr.io/jessytsui/cerul/worker:${WORKER_VERSION:-latest}
    # Build locally instead of pulling a published image:
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    #   args:
    #     YTDLP_VERSION: ${YTDLP_VERSION:-2025.06.09}
    env_file:
      - .env
    environment:
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-6}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      YTDLP_COOKIES_FILE: ${YTDLP_COOKIES_FILE:-/app/cookies.txt}
    # Uncomment on VPS instances that need authenticated YouTube downloads.
    # volumes:
    #   - ./cookies.txt:/app/cookies.txt:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
